<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<section>
		<div class="container-fluid bg-primary p-5 mt-3">
			<div class="row">
				<div class="col-md-8 offset-md-2">
					<form>
						<div class="input-group">
							<input type="text" class="form-control" name="ch">
							<button class="btn btn-light text-dark ms-3 col-md-2">
								<i class="fa-solid fa-magnifying-glass"></i> Search
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>

		<div class="container-fluid mt-1">
			<div class="row">
				<div class="col-md-2">
					<div class="list-group">
						<p class="fs-5">Categories</p>
						<a href="/products" class="list-group-item list-group-item-action"
							th:classappend="${paramValue == ''} ? 'active' : '' "
							aria-current="true"> All </a> <a th:each="c:${categories}"
							th:href="@{'/products?category='+${c.name}}"
							th:classappend="${paramValue==c.name} ? 'active':''"
							class="list-group-item list-group-item-action">[[${c.name}]]</a>
					</div>
				</div>
				<div class="col-md-10">
					<div class="card">
						<div class="card-body">
							<p class="fs-3 text-center">Products</p>
							<div class="row">
								<th:block th:if="${products.size>0}">
									<div class="col-md-3" th:each="p:${products}">
										<div class="card">
											<div class="card-body text-center">
												<img alt="" th:src="@{'/uploads/product/' + ${p.image}}"
													width="100%" height="150px">
												<p class="fs-5 text-center">[[${p.title}]]</p>
												<div class="row text-center">
													<p class="fs-6 fw-bold">
														<span class=" text-decoration-line-through text-primary">
															&#8377; [[${p.price}]] </span> <br> <span
															class="text-shadow"> &#8377;
															[[${p.discountPrice}]] </span> <span class="fs-6 text-success">[[${p.discount}]]%
															off</span>
													</p>
													<a th:href="@{'/product/'+${p.id}}"
														class="btn btn-primary col-md-6 offset-md-3">view
														details</a>
												</div>
											</div>
										</div>
									</div>
								</th:block>
								<th:block th:unless="${products.size>0}">

									<p class="fs-5 text-center text-danger ">Products not Avialabe</p>

								</th:block>

							</div>
						</div>
					</div>

				</div>
			</div>
		</div>
	</section>
</body>
</html>
