<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
</head>
<body>

	<section>
		<div class="container mt-4">
			<div class="card shadow">
				<div class="card-header bg-primary text-white text-center">
					<h4>Checkout</h4>
				</div>

				<div class="card-body">

					<form action="/user/placeOrder" method="post">

						<div class="row">


							<div class="col-md-6">

								<h5>Delivery Details</h5>

								<div class="mb-3">
									<label>Full Name</label> <input type="text" name="name"
										class="form-control" required>
								</div>

								<div class="mb-3">
									<label>Email</label> <input type="email" name="email"
										class="form-control" required>
								</div>

								<div class="mb-3">
									<label>Mobile Number</label> <input type="text" name="mobile"
										class="form-control" required>
								</div>

								<div class="mb-3">
									<label>Address</label>
									<textarea name="address" class="form-control" required></textarea>
								</div>

								<div class="mb-3">
									<label>City</label> <input type="text" name="city"
										class="form-control" required>
								</div>

								<div class="mb-3">
									<label>State</label> <input type="text" name="state"
										class="form-control" required>
								</div>

								<div class="mb-3">
									<label>Pincode</label> <input type="text" name="pincode"
										class="form-control" required>
								</div>

							</div>


							<div class="col-md-6">

								<h5>Payment Method</h5>

								<div class="form-check">
									<input class="form-check-input" type="radio" name="paymentType"
										value="COD" checked> <label class="form-check-label">Cash
										on Delivery</label>
								</div>

								<div class="form-check">
									<input class="form-check-input" type="radio" name="paymentType"
										value="ONLINE"> <label class="form-check-label">Online
										Payment</label>
								</div>

								<hr>
								<div class="">
									
										<table class="table table-borderless">
											<tbody>
												<tr>
													<td>Total Item Price</td>
													<td>:</td>
													<td>&#8377; 987655</td>
												</tr>

												<tr>
													<td>Handling Fee/Tax</td>
													<td>:</td>
													<td>&#8377; 987655</td>
												</tr>

												<tr>
													<td>Delivery Price</td>
													<td>:</td>
													<td>&#8377; 987655</td>
												</tr>

											</tbody>
										</table>
									
								</div>

								<h5>Total Price</h5>
								<h4 class="text-success">₹[[${totalPrice}]]</h4>

								<button type="submit" class="btn btn-warning w-100 mt-3">
									Place Order</button>

							</div>

						</div>

					</form>

				</div>
			</div>
		</div>
	</section>

</body>
</html>
