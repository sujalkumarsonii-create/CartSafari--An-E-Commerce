<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<section>
		<div class="container-fluid mt-2 p-2">
			<div class="row">
				<div class="col-md-12">
					<div class="card card-sh">
						<div class="card-header card-sh bg-primary">
							<p class="fs-4 text-center">Users</p>
							<th:block th:if="${session.success}">
								<p class="text-success fw-bold text-center">[[${session.success}]]</p>
								<th:block th:text="${@commonServiceImp.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errmsg}">
								<p class="text-danger fw-bold text-center">[[${session.errmsg}]]</p>
								<th:block th:text="${@commonServiceImp.removeSessionMessage()}"></th:block>
							</th:block>
						</div>

						<div class="card-body">
							<table class="table">
								<thead>
									<tr class="text-center">
										<th scope="col">Sl No.</th>
										<th scope="col">Name</th>
										<th scope="col">E-mail</th>
										<th scope="col">Mobile N0.</th>
										<th scope="col">Address</th>
										<th scope="col">Acc Status</th>
										<th scope="col">Profile Image</th>
										<th scope="col">Action</th>
									</tr>
								</thead>
								<tbody>
									<tr class="text-center" th:each="u,c:${users}">
										<th scope="row">[[${c.count}]]</th>


										<td>[[${u.name}]]</td>
										<td>[[${u.email}]]</td>
										<td>[[${u.mobileNumber}]]</td>
										<td>[[${u.address}]]</td>
										<!-- <td>[[${u.isEnable}]]</td> -->
										<td><th:block th:if="${u.isEnable==true}">Active</th:block>
											<th:block th:if="${u.isEnable==false}">Deactive</th:block></td>
										<td><img
											th:src="@{'/uploads/profile/' + ${u.profilePicture}}"
											width="70px" height="50px" class="border-radius-circle"></td>


										<td><a class="btn btn-success"
											th:href="@{'/admin/updateStatus?status=true&id='+${u.id}}"><i
												class="fa-solid fa-square-check"></i>Unblock</a> <a
											class="btn btn-danger"
											th:href="@{'/admin/updateStatus?status=false&id='+${u.id}}">
												<i class="fa-solid fa-ban"></i>Block
										</a></td>
									</tr>

								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
