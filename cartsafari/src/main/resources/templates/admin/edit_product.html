<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<section>
		<div class="container p-5">
			<div class="row">
				<div class="col-md-8 offset-md-2">
					<div class="card text-primary card-sh">
						<div class="card-header text-center fs-4">
							Edit Products

							<th:block th:if="${session.success}">
								<p class="text-success fw-bold">[[${session.success}]]</p>
								<th:block th:text="${@commonServiceImp.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errmsg}">
								<p class="text-danger fw-bold">[[${session.errmsg}]]</p>
								<th:block th:text="${@commonServiceImp.removeSessionMessage()}"></th:block>
							</th:block>

						</div>
						<div class="card-body">
							<form action="/admin/updateProduct" method="post"
								enctype="multipart/form-data">

								<input type="hidden" name="id" th:value="${product.id}">

								<div class="mb-3">
									<label>Title</label> <input type="text" name="title"
										th:value="${product.title}" class="form-control">
								</div>

								<div class="mb-3">
									<label>Description</label>
									<textarea rows="2" cols="" class="form-control"
										name="description">[[${product.description}]]</textarea>
								</div>
								<div class="row">

									<div class="mb-3 col">
										<label>Category</label> <select class="form-control"
											name="category">
											<option>[[${product.category}]]</option>
											<option th:each="c:${categories}">[[${c.name}]]</option>
										</select>
									</div>

									<div class="mb-3 col">
										<label>Price</label> <input type="number" name="price"
											th:value="${product.price}" class="form-control">
									</div>

								</div>

								<div class="mb-3">
									<label>Enter Status</label>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive"
											th:checked="${product.isActive==true}" id="radioDefault1"
											checked value="true"> <label class="form-check-label"
											for="radioDefault1"> Active </label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive"
											th:checked="${product.isActive==false}" id="radioDefault2"
											value="false"> <label class="form-check-label"
											for="radioDefault2"> Inactive </label>
									</div>

								</div>

								<div class="row">

									<div class="mb-3 col">
										<label>Discount</label> <input type="number" name="discount"
											th:value="${product.discount}" class="form-control">
									</div>

									<div class="mb-3 col">
										<label>Discount Price</label> <input type="number"
											readonly="readonly" th:value="${product.discountPrice}"
											class="form-control">
									</div>

								</div>

								<div class="row">
									<div class="col mb-3">
										<label>Stock</label> <input type="number" name="stock"
											th:value="${product.stock}" class="form-control">
									</div>

									<div class="col mb-3">
										<label>Upload Image</label> <input type="file" name="file"
											class="form-control">
									</div>

									<div class="mt-1">
										<img th:src="@{'/uploads/product/' + ${product.image}}"
											width="100px" height="100px">
									</div>

								</div>

								<button class="btn btn-primary col-md-12">Update</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
