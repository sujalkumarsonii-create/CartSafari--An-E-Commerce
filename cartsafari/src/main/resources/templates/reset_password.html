<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<section>
		<div class="container mt-4 p-4">
			<div class="row">
				<div class="col-md-6 p-2 ">
					<img alt=""
						src="https://th.bing.com/th/id/OIP.NuRBCI6hg2rEnVHvKgcobAHaDt?w=338&h=175&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3"
						width="146%" height="500px">
				</div>

				<div class="col-md-6 p-5">
					<div class="card shadow p-3 mb-5 bg-body-tertiary rounded">
						<div class="card-header">
							<p class="fs-4 text-center">Reset Password</p>
							<th:block th:if="${session.success}">
								<p class="text-success fw-bold text-center">[[${session.success}]]</p>
								<th:block th:text="${@commonServiceImp.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errmsg}">
								<p class="text-danger fw-bold text-center">[[${session.errmsg}]]</p>
								<th:block th:text="${@commonServiceImp.removeSessionMessage()}"></th:block>
							</th:block>

						</div>
						<div class="card-body">
							<form action="/reset_password" method="post">
								<div class="mb-3">
									<label class="form-label">New Password</label> <input
										class="form-control" name="password" type="password">
								</div>
								<div class="mb-3">
									<label class="form-label">Confirm Password</label> <input
										class="form-control" type="password">
								</div>
								<input type="hidden" th:value="${token}" name="token">
								<button class="btn bg-primary text-white col-md-12"
									type="submit">Reset</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

</body>
</html>
