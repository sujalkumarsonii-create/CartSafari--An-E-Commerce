<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<section>
		<div class="container mt-4 p-4">
			<div class="row">
				<div class="col-md-6 p-2 ">
					<img alt=""
						src="https://th.bing.com/th/id/OIP.NuRBCI6hg2rEnVHvKgcobAHaDt?w=338&h=175&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3"
						width="146%" height="500px">
				</div>

				<div class="col-md-6 p-5">
					<div class="card shadow p-3 mb-5 bg-body-tertiary rounded">
						<div class="card-header">
							<p class="fs-4 text-center">Login</p>
							<div th:if="${param.error}" class="alert alert-danger">
								[[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]</div>
							<div th:if="${param.logout}" class="alert alert-success">
								Logout Successfully</div>
						</div>
						<div class="card-body">
							<form action="/login" method="post">
								<div class="mb-3">
									<label class="form-label">Email</label> <input
										class="form-control" name="username" type="email">
								</div>
								<div class="mb-3">
									<label class="form-label">Password</label> <input
										class="form-control" name="password" type="password">
								</div>
								<button class="btn bg-primary text-white col-md-12"
									type="submit">Log In</button>
							</form>
						</div>

						<div class="card-footer text-center">
							<a href="/forgot_password" style="text-decoration: none;">forgot password</a><br>
							<p>
								Don't have an account ?<a href="/register"
									style="text-decoration: none;">Create new Account</a>
							</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

</body>
</html>
